name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Black
        run: |
          pip install black
          black --check src/

      - name: Run tests
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test          # ✅ only runs if test job passes
    if: github.ref == 'refs/heads/main'  # ✅ only on main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger Streamlit Cloud deployment
        run: |
          echo "✅ Tests passed — Streamlit Cloud will auto-deploy from main"
          echo "🚀 Deployment triggered at $(date)"
          echo "🔗 App URL: https://web-scraping-4a4ysvczkzu74qsjrdtzvy.streamlit.app"